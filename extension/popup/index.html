<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人知识库收藏助手</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }

    .header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
    }

    .header img {
      width: 32px;
      height: 32px;
      margin-right: 8px;
    }

    .header h1 {
      font-size: 16px;
      margin: 0;
      color: #333;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      color: #666;
    }

    .form-group select,
    .form-group input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      box-sizing: border-box;
    }

    .btn-group {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-primary {
      background-color: #4a86e8;
      color: white;
    }

    .btn-primary:hover {
      background-color: #3a76d8;
    }

    .btn-secondary {
      background-color: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover {
      background-color: #e0e0e0;
    }

    .message {
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      margin-top: 12px;
      display: none;
    }

    .message.success {
      background-color: #dff0d8;
      color: #3c763d;
      border: 1px solid #d6e9c6;
    }

    .message.error {
      background-color: #f2dede;
      color: #a94442;
      border: 1px solid #ebccd1;
    }

    .settings-link {
      display: block;
      text-align: center;
      font-size: 12px;
      color: #4a86e8;
      text-decoration: none;
      margin-top: 12px;
    }

    .settings-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="../icons/icon49.png" alt="知识库图标">
    <h1>个人知识库收藏助手</h1>
  </div>

  <div class="form-group">
    <label for="collection">选择收藏集 <span id="collectionStatus" style="font-size: 10px; color: #999; margin-left: 5px;"></span></label>
    <select id="collection">
      <option value="">正在加载...</option>
    </select>
  </div>

  <div class="form-group">
    <label for="type">内容类型</label>
    <select id="type">
      <option value="1">网页</option>
      <option value="2">图片</option>
      <option value="3">文本</option>
      <option value="4">视频</option>
    </select>
  </div>

  <div class="btn-group">
    <button id="saveBtn" class="btn-primary">收藏当前页面</button>
  </div>

  <div id="message" class="message"></div>

  <a href="#" id="settingsLink" class="settings-link">设置API地址和Token</a>

  <script src="script.js"></script>
</body>
</html>
